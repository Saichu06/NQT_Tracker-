<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">
  <title>TCS NQT Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* Light/Dark Mode Variables */
    :root {
      /* Dark mode (default) */
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2330;
      --border: #21262d;
      --border2: #30363d;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --green: #3fb950;
      --green-glow: rgba(63, 185, 80, 0.15);
      --yellow: #d29922;
      --red: #f85149;
      --orange: #e3b341;
      --purple: #bc8cff;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #6e7681;
      --easy: #3fb950;
      --medium: #d29922;
      --hard: #f85149;
      --tag-arr: #1f4068;
      --tag-arr-t: #79c0ff;
      --tag-str: #3d1f68;
      --tag-str-t: #d2a8ff;
      --tag-dp: #683a1f;
      --tag-dp-t: #ffa657;
      --tag-math: #1f4a3a;
      --tag-math-t: #56d364;
      --tag-tree: #4a3a1f;
      --tag-tree-t: #e3b341;
      --tag-graph: #3a1f1f;
      --tag-graph-t: #ffa198;
      --tag-sort: #1f3a4a;
      --tag-sort-t: #70b8ff;
      --tag-ll: #2d1f4a;
      --tag-ll-t: #c9b1ff;
      --tag-greedy: #3a4a1f;
      --tag-greedy-t: #bef5cb;
      --tag-logic: #4a1f3a;
      --tag-logic-t: #ffb3d7;
      --tag-sim: #1f3d3d;
      --tag-sim-t: #76e3ea;
    }

    /* Light mode */
    [data-theme="light"] {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface2: #f0f3f6;
      --border: #d0d7de;
      --border2: #e1e4e8;
      --accent: #0969da;
      --accent-glow: rgba(9, 105, 218, 0.08);
      --green: #1a7f37;
      --green-glow: rgba(26, 127, 55, 0.08);
      --yellow: #9a6700;
      --red: #cf222e;
      --orange: #bc4c00;
      --purple: #8250df;
      --text: #1f2328;
      --text2: #656d76;
      --text3: #8c959f;
      --easy: #1a7f37;
      --medium: #9a6700;
      --hard: #cf222e;
      --tag-arr: #ddf4ff;
      --tag-arr-t: #0969da;
      --tag-str: #fbe9ff;
      --tag-str-t: #8250df;
      --tag-dp: #ffebda;
      --tag-dp-t: #bc4c00;
      --tag-math: #daf5e7;
      --tag-math-t: #1a7f37;
      --tag-tree: #fff0d6;
      --tag-tree-t: #9a6700;
      --tag-graph: #ffebe9;
      --tag-graph-t: #cf222e;
      --tag-sort: #ddf4ff;
      --tag-sort-t: #0969da;
      --tag-ll: #fbe9ff;
      --tag-ll-t: #8250df;
      --tag-greedy: #daf5e7;
      --tag-greedy-t: #1a7f37;
      --tag-logic: #ffebe9;
      --tag-logic-t: #cf222e;
      --tag-sim: #ddf4ff;
      --tag-sim-t: #0969da;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ═══ TOP BAR ═══ */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-badge {
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 1px;
    }

    .topbar h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .progress-mini {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .mini-bar {
      width: 120px;
      height: 6px;
      background: var(--border2);
      border-radius: 3px;
      overflow: hidden;
    }

    .mini-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 3px;
      transition: width .4s ease;
    }

    .pct-label {
      color: var(--green);
      font-weight: 700;
    }

    /* ═══ MAIN LAYOUT ═══ */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    /* ═══ STATS ═══ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .theme-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  width: 36px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.theme-btn:hover {
  background: var(--accent-glow);
  border-color: var(--accent);
  transform: scale(1.05);
}

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      text-align: center;
      transition: border-color .2s;
    }

    .stat-card:hover {
      border-color: var(--border2);
    }

    .stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      display: block;
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: .5px;
      margin-top: 2px;
    }

    .s-total .stat-num {
      color: var(--accent);
    }

    .s-done .stat-num {
      color: var(--green);
    }

    .s-easy .stat-num {
      color: var(--easy);
    }

    .s-med .stat-num {
      color: var(--medium);
    }

    .s-hard .stat-num {
      color: var(--hard);
    }

    .s-rem .stat-num {
      color: var(--purple);
    }

    /* ═══ FILTER BAR ═══ */
    .filter-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 11px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      margin-right: 4px;
    }

    .f-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      transition: all .18s;
    }

    .f-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .f-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .f-btn.fe.active {
      border-color: var(--easy);
      color: var(--easy);
      background: rgba(63, 185, 80, .12);
    }

    .f-btn.fm.active {
      border-color: var(--medium);
      color: var(--medium);
      background: rgba(210, 153, 34, .12);
    }

    .f-btn.fh.active {
      border-color: var(--hard);
      color: var(--hard);
      background: rgba(248, 81, 73, .12);
    }

    .search-wrap {
      margin-left: auto;
    }

    .search-box {
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
      width: 220px;
      transition: border-color .2s;
    }

    .search-box:focus {
      border-color: var(--accent);
    }

    .search-box::placeholder {
      color: var(--text3);
    }

    /* ═══ SECTION HEADER ═══ */
    .section-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 28px 0 10px;
    }

    .section-hdr-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-hdr-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      white-space: nowrap;
      padding: 0 8px;
    }

    .section-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-glow);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* ═══ QUESTION ROW ═══ */
    .q-row {
      display: grid;
      grid-template-columns: 36px 40px 1fr auto auto auto;
      gap: 0;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color .18s, background .18s;
      padding: 12px 16px;
      position: relative;
    }

    .q-row:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .q-row.done {
      border-left: 2px solid var(--green);
      opacity: 0.65;
    }

    .q-row.done .q-name {
      text-decoration: line-through;
      color: var(--text3);
    }

    .q-row.has-notes::after {
      content: '📝';
      position: absolute;
      right: 200px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      opacity: 0.7;
    }

    .q-check {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .q-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .q-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      padding-right: 12px;
    }

    .q-info {
      min-width: 0;
      padding-right: 12px;
    }

    .q-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .q-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tag {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 1px 7px;
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: .3px;
    }

    .tag-arr {
      background: var(--tag-arr);
      color: var(--tag-arr-t);
    }

    .tag-str {
      background: var(--tag-str);
      color: var(--tag-str-t);
    }

    .tag-dp {
      background: var(--tag-dp);
      color: var(--tag-dp-t);
    }

    .tag-math {
      background: var(--tag-math);
      color: var(--tag-math-t);
    }

    .tag-tree {
      background: var(--tag-tree);
      color: var(--tag-tree-t);
    }

    .tag-graph {
      background: var(--tag-graph);
      color: var(--tag-graph-t);
    }

    .tag-sort {
      background: var(--tag-sort);
      color: var(--tag-sort-t);
    }

    .tag-ll {
      background: var(--tag-ll);
      color: var(--tag-ll-t);
    }

    .tag-greedy {
      background: var(--tag-greedy);
      color: var(--tag-greedy-t);
    }

    .tag-logic {
      background: var(--tag-logic);
      color: var(--tag-logic-t);
    }

    .tag-sim {
      background: var(--tag-sim);
      color: var(--tag-sim-t);
    }

    .q-diff-cell {
      padding: 0 12px 0 0;
    }

    .diff-badge {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .diff-E {
      background: rgba(63, 185, 80, .12);
      color: var(--easy);
    }

    .diff-M {
      background: rgba(210, 153, 34, .12);
      color: var(--medium);
    }

    .diff-H {
      background: rgba(248, 81, 73, .12);
      color: var(--hard);
    }

    .q-year {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      margin-right: 10px;
      white-space: nowrap;
    }

    .q-open-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--accent);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .18s;
      font-family: 'Outfit', sans-serif;
    }

    .q-open-btn:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
    }

    /* ═══ MODAL ═══ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(1, 4, 9, .85);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      width: 100%;
      max-width: 780px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .6);
    }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 2;
    }

    .modal-title-area {
      flex: 1;
    }

    .modal-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 4px;
    }

    .modal-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .modal-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      align-items: center;
    }

    .modal-close {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      transition: all .18s;
    }

    .modal-close:hover {
      background: rgba(248, 81, 73, .15);
      border-color: var(--red);
      color: var(--red);
    }

    .modal-body {
      padding: 20px 24px 24px;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section-label {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .modal-desc {
      font-size: 13px;
      color: var(--text2);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      line-height: 1.7;
    }

    .modal-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all .18s;
      border: 1px solid;
    }

    .ml-lc {
      background: rgba(88, 166, 255, .1);
      color: var(--accent);
      border-color: rgba(88, 166, 255, .3);
    }

    .ml-gfg {
      background: rgba(63, 185, 80, .1);
      color: var(--green);
      border-color: rgba(63, 185, 80, .3);
    }

    .ml-hr {
      background: rgba(210, 153, 34, .1);
      color: var(--orange);
      border-color: rgba(210, 153, 34, .3);
    }

    .ml-custom {
      background: rgba(188, 140, 255, .1);
      color: var(--purple);
      border-color: rgba(188, 140, 255, .3);
    }

    .modal-link:hover {
      filter: brightness(1.2);
    }

    .modal-link:target {}

    /* textarea inputs */
    .modal-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
      min-height: 110px;
      line-height: 1.6;
    }

    .modal-textarea:focus {
      border-color: var(--accent);
    }

    .modal-textarea::placeholder {
      color: var(--text3);
    }

    .modal-ref-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .modal-ref-input:focus {
      border-color: var(--purple);
    }

    /* save bar */
    .modal-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      bottom: 0;
    }

    .save-btn {
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: #fff;
      border: none;
      padding: 9px 28px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: filter .2s, transform .1s;
    }

    .save-btn:hover {
      filter: brightness(1.1);
    }

    .save-btn:active {
      transform: scale(.98);
    }

    .save-msg {
      font-size: 12px;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0;
      transition: opacity .3s;
    }

    .save-msg.show {
      opacity: 1;
    }

    .mark-done-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
    }

    .mark-done-btn.done-active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    .mark-done-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    /* ═══ EMPTY STATE ═══ */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* ═══ YEAR SOURCE PILL ═══ */
    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: 3px;
      background: rgba(88, 166, 255, .08);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, .2);
    }

    @media (max-width: 640px) {
      .q-row {
        grid-template-columns: 36px 36px 1fr auto;
        gap: 0;
      }

      .q-diff-cell {
        display: none;
      }

      .q-year {
        display: none;
      }

      .q-tags {
        display: none;
      }

      .topbar h1 {
        display: none;
      }

      .modal-links {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">

    function getQ(n) { return QUESTIONS.find(q => q.n === n); }
    function getData(n) { return data[n] || { solved: false, solution: '', notes: '', ref: '' }; }

    // ═══════════════════
    // RENDER
    // ═══════════════════
    const CATEGORIES = [...new Set(QUESTIONS.map(q => q.cat))];

    function filterQuestions() {
      const search = document.getElementById('search-box').value.trim().toLowerCase();
      return QUESTIONS.filter(q => {
        const d = getData(q.n);
        if (activeFilter === 'todo' && d.solved) return false;
        if (activeFilter === 'done' && !d.solved) return false;
        if (['E', 'M', 'H'].includes(activeFilter) && q.diff !== activeFilter) return false;
        if (['arr', 'str', 'math', 'dp', 'sim'].includes(activeFilter) && !q.tags.includes(activeFilter)) return false;
        if (search && !q.name.toLowerCase().includes(search) && !q.cat.toLowerCase().includes(search) && !q.tags.join('').includes(search)) return false;
        return true;
      });
    }

    function buildTag(t) {
      const labels = { arr: 'Array', str: 'String', dp: 'DP', math: 'Math', tree: 'Tree', graph: 'Graph', sort: 'Sort', ll: 'LinkedList', greedy: 'Greedy', logic: 'Logic', sim: 'Simulation' };
      return `<span class="tag tag-${t}">${labels[t] || t}</span>`;
    }

    function renderAll() {
      const container = document.getElementById('list-container');
      const filtered = filterQuestions();
      container.innerHTML = '';
      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>No questions match your filter</div></div>`;
        return;
      }
      // Group by category
      const bycat = {};
      filtered.forEach(q => { if (!bycat[q.cat]) bycat[q.cat] = []; bycat[q.cat].push(q); });
      CATEGORIES.forEach(cat => {
        if (!bycat[cat]) return;
        const qs = bycat[cat];
        container.innerHTML += `
      <div class="section-hdr">
        <div class="section-hdr-line"></div>
        <div class="section-hdr-text">${cat}</div>
        <div class="section-count">${qs.length}</div>
        <div class="section-hdr-line"></div>
      </div>`;
        qs.forEach(q => {
          const d = getData(q.n);
          const hasNotes = d.notes.trim() || d.solution.trim() || d.ref.trim();
          container.innerHTML += `
        <div class="q-row ${d.solved ? 'done' : ''} ${hasNotes ? 'has-notes' : ''}" onclick="openModal(${q.n})">
          <div class="q-check"><input type="checkbox" ${d.solved ? 'checked' : ''} onclick="event.stopPropagation();quickToggle(${q.n},this)"></div>
          <div class="q-num">${String(q.n).padStart(2, '0')}</div>
          <div class="q-info">
            <div class="q-name">${q.name}</div>
            <div class="q-tags">${q.tags.map(buildTag).join('')}</div>
          </div>
          <div class="q-year"><span class="source-pill">${q.year}</span></div>
          <div class="q-diff-cell"><span class="diff-badge diff-${q.diff}">${q.diff === 'E' ? 'Easy' : q.diff === 'M' ? 'Medium' : 'Hard'}</span></div>
          <button class="q-open-btn" onclick="event.stopPropagation();openModal(${q.n})">Open →</button>
        </div>`;
        });
      });
      updateStats();
    }

    function updateStats() {
      const solved = QUESTIONS.filter(q => getData(q.n).solved);
      const total = QUESTIONS.length;
      document.getElementById('s-total').textContent = total;
      document.getElementById('s-done').textContent = solved.length;
      document.getElementById('s-rem').textContent = total - solved.length;
      document.getElementById('s-easy').textContent = solved.filter(q => q.diff === 'E').length;
      document.getElementById('s-med').textContent = solved.filter(q => q.diff === 'M').length;
      document.getElementById('s-hard').textContent = solved.filter(q => q.diff === 'H').length;
      const pct = Math.round(solved.length / total * 100);
      document.getElementById('top-pct').textContent = pct + '%';
      document.getElementById('mini-fill').style.width = pct + '%';
    }

    // ═══════════════════
    // FILTER
    // ═══════════════════
    function applyFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    }

    // ═══════════════════
    // QUICK CHECKBOX
    // ═══════════════════
    function quickToggle(n, el) {
      if (!data[n]) data[n] = { solved: false, solution: '', notes: '', ref: '' };
      data[n].solved = el.checked;
      localStorage.setItem('tcs_nqt_data', JSON.stringify(data));
      const row = el.closest('.q-row');
      if (el.checked) { row.classList.add('done'); } else { row.classList.remove('done'); }
      updateStats();
    }

    // Theme Toggle
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'dark' ? '🌙' : '☀️';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = current === 'dark' ? 'light' : 'dark';
  setTheme(newTheme);
}

// Load saved theme on page load
const savedTheme = localStorage.getItem('theme') || 'dark';
setTheme(savedTheme);

    // ═══════════════════
    // MODAL
    // ═══════════════════
    function openModal(n) {
      currentQId = n;
      const q = getQ(n);
      const d = getData(n);
      // Fill header
      document.getElementById('m-num').textContent = `#${String(n).padStart(2, '0')} · ${q.cat}`;
      document.getElementById('m-name').textContent = q.name;
      // Meta
      let meta = `<span class="diff-badge diff-${q.diff}">${q.diff === 'E' ? 'Easy' : q.diff === 'M' ? 'Medium' : 'Hard'}</span>`;
      meta += q.tags.map(buildTag).join('');
      meta += `<span class="source-pill">📅 ${q.year}</span>`;
      meta += `<span class="source-pill">📌 ${q.source}</span>`;
      document.getElementById('m-meta').innerHTML = meta;
      // Desc
      document.getElementById('m-desc').textContent = q.desc;
      // Links
      let links = '';
      if (q.lc) links += `<a class="modal-link ml-lc" href="${q.lc}" target="_blank">⚡ LeetCode</a>`;
      if (q.gfg) links += `<a class="modal-link ml-gfg" href="${q.gfg}" target="_blank">🌿 GeeksForGeeks</a>`;
      if (q.hr) links += `<a class="modal-link ml-hr" href="${q.hr}" target="_blank">⭐ HackerRank</a>`;
      if (q.custom) links += `<a class="modal-link ml-custom" href="${q.custom}" target="_blank">🔗 Source / PYQ</a>`;
      if (!links) links = `<span style="color:var(--text3);font-size:13px;">This is a custom TCS problem. Practice via the source link.</span>`;
      document.getElementById('m-links').innerHTML = links;
      // User data
      document.getElementById('m-solution').value = d.solution || '';
      document.getElementById('m-notes').value = d.notes || '';
      document.getElementById('m-ref').value = d.ref || '';
      // Done button
      const btn = document.getElementById('mark-done-btn');
      btn.textContent = d.solved ? '✓ Solved' : 'Mark as Solved';
      btn.className = 'mark-done-btn' + (d.solved ? ' done-active' : '');
      // Show
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

    function saveModal() {
      if (!currentQId) return;
      if (!data[currentQId]) data[currentQId] = { solved: false, solution: '', notes: '', ref: '' };
      data[currentQId].solution = document.getElementById('m-solution').value;
      data[currentQId].notes = document.getElementById('m-notes').value;
      data[currentQId].ref = document.getElementById('m-ref').value;
      localStorage.setItem('tcs_nqt_data', JSON.stringify(data));
      const msg = document.getElementById('save-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);
      renderAll();
    }

    function toggleDone() {
      if (!currentQId) return;
      if (!data[currentQId]) data[currentQId] = { solved: false, solution: '', notes: '', ref: '' };
      data[currentQId].solved = !data[currentQId].solved;
      localStorage.setItem('tcs_nqt_data', JSON.stringify(data));
      const btn = document.getElementById('mark-done-btn');
      const s = data[currentQId].solved;
      btn.textContent = s ? '✓ Solved' : 'Mark as Solved';
      btn.className = 'mark-done-btn' + (s ? ' done-active' : '');
      renderAll();
    }

    // ═══════════════════
    // INIT
    // ═══════════════════
    renderAll();
  </script>
</body>

</html>
